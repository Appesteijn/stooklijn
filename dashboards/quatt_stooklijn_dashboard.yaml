title: Quatt Warmteanalyse
views:
  - title: Warmteanalyse
    icon: mdi:chart-line
    cards: []
    type: sections
    sections:
      - type: grid
        column_span: 4
        cards:
          - square: false
            type: grid
            columns: 3
            cards:
              - type: entity
                entity: text.quatt_warmteanalyse_analyse_startdatum
                name: Startdatum
              - type: entity
                entity: text.quatt_warmteanalyse_analyse_einddatum
                name: Einddatum
              - type: entity
                entity: sensor.quatt_warmteanalyse_last_analysis
                name: Laatste Analyse
                icon: mdi:clock-check-outline
              - show_name: true
                show_icon: true
                type: button
                name: Analyse Starten
                icon: mdi:play-circle
                tap_action:
                  action: call-service
                  service: quatt_stooklijn.run_analysis
                icon_height: 48px
              - show_name: true
                show_icon: true
                type: button
                name: Data Wissen
                icon: mdi:delete-outline
                tap_action:
                  action: call-service
                  service: quatt_stooklijn.clear_data
                  confirmation:
                    text: Weet je zeker dat je alle analysedata wilt wissen?
                icon_height: 48px
              - type: entity
                entity: sensor.quatt_warmteanalyse_analysis_status
                name: Status
                icon: mdi:information-outline
            grid_options: &ref_0
              columns: 24
              rows: auto
          - square: false
            type: grid
            columns: 3
            cards:
              - type: entity
                entity: sensor.quatt_warmteanalyse_average_cop
                name: Gemiddelde COP
                icon: mdi:gauge
              - type: entity
                entity: sensor.quatt_warmteanalyse_geschatte_actuele_cop
                name: Actuele COP (schatting)
                icon: mdi:gauge-low
              - type: entity
                entity: sensor.quatt_warmteanalyse_heat_loss_coefficient
                name: Warmteverlies
                icon: mdi:home-thermometer
              - type: entity
                entity: sensor.quatt_warmteanalyse_balance_point_temperature
                name: Balans Temperatuur
                icon: mdi:thermometer-check
              - type: entity
                entity: sensor.quatt_warmteanalyse_knee_temperature
                name: Knikpunt
                icon: mdi:thermometer-alert
              - type: entity
                entity: sensor.quatt_warmteanalyse_aanbevolen_aanvoertemperatuur
                name: Aanbevolen Aanvoer
                icon: mdi:thermometer-water
              - type: entity
                entity: sensor.heatpump_thermostat_control_setpoint
                name: Quatt Setpoint
                icon: mdi:thermometer-chevron-up
            grid_options: *ref_0
          - type: markdown
            title: Stooklijn aanpassen?
            content: >
              {% set house_balance = states('sensor.quatt_warmteanalyse_balance_point_temperature') | float(0) %}

              {% set hlc_slope = state_attr('sensor.quatt_warmteanalyse_heat_loss_coefficient', 'slope') | float(0) %}

              {% set hlc_intercept = state_attr('sensor.quatt_warmteanalyse_heat_loss_coefficient', 'intercept') | float(0) %}

              {% set act_slope = states('sensor.quatt_warmteanalyse_actual_stooklijn_setting') | float(0) %}

              {% set act_intercept = state_attr('sensor.quatt_warmteanalyse_actual_stooklijn_setting', 'intercept') | float(0) %}

              {% set est_balance_daily = state_attr('sensor.quatt_warmteanalyse_quatt_stooklijn_slope', 'balance_temp_daily') | float(0) %}

              {% set slope_ratio = state_attr('sensor.quatt_warmteanalyse_optimal_stooklijn_slope', 'quatt_slope_ratio') | float(0) %}

              {% if hlc_slope == 0 or hlc_intercept == 0 %}

              *Voer eerst een analyse uit.*

              {% elif act_slope != 0 %}

              {% set quatt_slope = act_slope %}

              {% set quatt_intercept = act_intercept %}

              {% set quatt_source = "geconfigureerde instelling" %}

              {% set quatt_balance = (-quatt_intercept / quatt_slope) | round(1) %}

              {% elif est_balance_daily != 0 %}

              {% set quatt_balance = est_balance_daily | round(1) %}

              {% set quatt_source = "schatting op basis van dagelijkse data" %}

              {% else %}

              ℹ️ Voer je huidige Quatt-instelling in via de configuratie om een advies te krijgen.

              {% endif %}

              {% if quatt_balance is defined %}

              {% set diff = (quatt_balance - house_balance) | round(1) %}

              {% set diff_abs = diff | abs %}

              *(Gebaseerd op {{ quatt_source }})*

              {% if diff_abs <= 2 %}

              ✅ **Geen aanpassing nodig** — De Quatt-balanstemperatuur ({{ quatt_balance }}°C) sluit
              goed aan op de warmtevraag van jouw huis ({{ house_balance | round(1) }}°C, verschil {{ diff_abs }}°C).

              {% elif diff > 2 %}

              ⚠️ **Aanpassing aanbevolen — Quatt verwarmt te lang door bij mild weer**


              Quatt stopt pas met verwarmen bij {{ quatt_balance }}°C, maar jouw huis heeft al geen warmte
              meer nodig boven {{ house_balance | round(1) }}°C. Bij zachte temperaturen (boven
              {{ house_balance | round(0) | int }}°C) draait de warmtepomp dus onnodig door.

              {% if quatt_slope is defined %}

              {% set waste_w = (quatt_slope * house_balance + quatt_intercept) | round(0) | int %}

              Bij {{ house_balance | round(1) }}°C levert de warmtepomp nog **{{ waste_w }} W**
              terwijl de warmtevraag al 0 is. Dit verhoogt het elektriciteitsverbruik zonder
              extra warmtecomfort.

              {% endif %}

              **Advies:** vraag Quatt de balanstemperatuur te verlagen naar ~{{ house_balance | round(0) | int }}°C.
              Gebruik de waarden in de tabel *Warmtevraag bij verschillende temperaturen* als referentie.

              {% if slope_ratio > 0 and slope_ratio > 1.15 %}

              *Let op: de helling van Quatt's stooklijn is {{ ((slope_ratio - 1) * 100) | round(0) | int }}% steiler dan optimaal — bij mild weer produceert de warmtepomp meer warmte dan nodig.*

              {% elif slope_ratio > 0 and slope_ratio < 0.85 %}

              *Let op: de helling van Quatt's stooklijn is {{ ((1 - slope_ratio) * 100) | round(0) | int }}% vlakker dan optimaal — bij strenge kou kan de warmtepomp te weinig leveren.*

              {% endif %}

              {% else %}

              ⚠️ **Aanpassing aanbevolen — Quatt verwarmt te weinig bij mild weer**


              Quatt stopt al met verwarmen bij {{ quatt_balance }}°C, maar jouw huis heeft warmte
              nodig tot {{ house_balance | round(1) }}°C. Bij temperaturen tussen {{ quatt_balance }}°C
              en {{ house_balance | round(1) }}°C levert de warmtepomp te weinig.

              {% set shortfall_w = (hlc_slope * quatt_balance + hlc_intercept) | round(0) | int %}

              Bij {{ quatt_balance }}°C is de warmtevraag nog **{{ shortfall_w }} W**, maar de
              warmtepomp geeft al 0. Dit moet worden overgenomen door de cv-ketel (lagere COP).


              **Advies:** vraag Quatt de balanstemperatuur te verhogen naar ~{{ house_balance | round(0) | int }}°C.
              Gebruik de waarden in de tabel *Warmtevraag bij verschillende temperaturen* als referentie.

              {% endif %}

              {% endif %}
            grid_options:
              columns: 8
              rows: 6
          - type: history-graph
            title: Aanvoertemperatuur — Aanbevolen vs Quatt
            hours_to_show: 24
            entities:
              - entity: sensor.quatt_warmteanalyse_aanbevolen_aanvoertemperatuur
                name: Aanbevolen
              - entity: sensor.heatpump_thermostat_control_setpoint
                name: Quatt setpoint
              - entity: sensor.heatpump_flowmeter_temperature
                name: Werkelijk (flowmeter)
            grid_options:
              columns: 16
              rows: 6
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Wat betekenen deze waarden?
            content: >
              {% set hlc =
              states('sensor.quatt_warmteanalyse_heat_loss_coefficient') %}

              {% set bp =
              states('sensor.quatt_warmteanalyse_balance_point_temperature') %}

              {% set knee = states('sensor.quatt_warmteanalyse_knee_temperature') %}

              {% set cop = states('sensor.quatt_warmteanalyse_average_cop') %}

              {% if hlc not in ['unknown', 'unavailable', 'None'] %}

              **Warmteverlies ({{ hlc }} W/K)** — Per graad dat het buiten
              kouder is dan de balanstemperatuur, verliest je huis {{ hlc }}
              Watt aan warmte. Hoe lager dit getal, hoe beter je huis is
              geïsoleerd.


              **Balanstemperatuur ({{ bp }}°C)** — De buitentemperatuur waarbij
              je huis geen verwarming nodig heeft. Boven deze temperatuur levert
              interne warmte (apparaten, zonlicht, bewoners) voldoende energie.


              **Knikpunt ({{ knee }}°C)** — De buitentemperatuur waaronder de
              warmtepomp het alleen niet meer redt en de cv-ketel moet
              bijspringen. Hoe lager dit punt, hoe groter het werkgebied van je
              warmtepomp.


              **Gemiddelde COP ({{ cop }})** — De efficiëntie van de warmtepomp:
              hoeveel kWh warmte je krijgt per kWh elektriciteit. Een COP van {{
              cop }} betekent dat elke kWh stroom {{ cop }} kWh warmte oplevert.

              {% else %}

              *Voer eerst een analyse uit om uitleg bij de waarden te zien.*

              {% endif %}
            grid_options:
              columns: 33
              rows: auto
          - type: markdown
            title: Warmtevraag bij verschillende temperaturen
            content: >
              {% set temps =
              state_attr('sensor.quatt_warmteanalyse_heat_loss_coefficient',
              'heat_at_temps') %}

              {% if temps %}

              Buitentemp | Vermogen | Warmte/dag | COP | Stroom/dag

              :--|--:|--:|--:|--:

              {% for t, data in temps.items() -%}

              **{{ t }}°C** | **{{ data.heat | round(0) | int }} W** | {{ (data.heat
              * 24 / 1000) | round(1) }} kWh | {% if data.cop %}{{ data.cop |
              round(2) }}{% else %}-{% endif %} | {% if data.cop and data.cop > 0
              %}{{ ((data.heat * 24 / 1000) / data.cop) | round(1) }} kWh{% else
              %}-{% endif %}

              {% endfor %}

              {% else %}

              *Voer eerst een analyse uit*

              {% endif %}
            grid_options:
              columns: 15
              rows: auto

          # ── Grafiek 1: Huis thermisch profiel ──────────────────────────────
          - type: custom:apexcharts-card
            chart_type: scatter
            header:
              title: Huis thermisch profiel
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 350
              xaxis:
                min: "EVAL:Date.now() - 36 * 3600000"
                max: "EVAL:Date.now()"
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: "EVAL:function(val) { return Math.round(20 - (new Date().getTime() - val) / 3600000) + '°C'; }"
              yaxis:
                title:
                  text: Vermogen (W)
                min: 0
                labels:
                  formatter: "EVAL:function(val) { return Math.round(val) + ' W'; }"
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_optimal_stooklijn_slope
                name: Dagelijkse warmtevraag
                color: "#66BB6A"
                data_generator: |
                  const attrs = hass.states['sensor.quatt_warmteanalyse_optimal_stooklijn_slope']?.attributes || {};
                  const balanceTemp = attrs.balance_temp ?? 20;
                  const now = Date.now(), d = (attrs.scatter_data || []).filter(p => p.heat > 0 && p.temp < balanceTemp);
                  return d.map(p => [now - (20 - p.temp) * 3600000, p.heat]);
              - entity: sensor.quatt_warmteanalyse_optimal_stooklijn_slope
                name: Optimale stooklijn
                color: "#4CAF50"
                type: line
                curve: straight
                data_generator: |
                  const st = hass.states['sensor.quatt_warmteanalyse_optimal_stooklijn_slope'];
                  const s = parseFloat(st?.state), ic = st?.attributes?.intercept;
                  if (isNaN(s) || ic == null) return [];
                  const now = Date.now(), pts = [], maxT = s !== 0 ? Math.min(-ic/s, 19) : 19;
                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }
                  return pts;
              - entity: sensor.quatt_warmteanalyse_quatt_warmteanalyse_slope
                name: Quatt stooklijn (geschat)
                color: "#FFC107"
                type: line
                curve: straight
                data_generator: |
                  const attrs = hass.states['sensor.quatt_warmteanalyse_quatt_warmteanalyse_slope']?.attributes || {};
                  const s = attrs.slope_daily, ic = attrs.intercept_daily;
                  if (!s || ic == null) return [];
                  const now = Date.now(), pts = [], maxT = s !== 0 ? Math.min(-ic/s, 19) : 19;
                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }
                  return pts;
              - entity: sensor.quatt_warmteanalyse_actual_stooklijn_setting
                name: Geconfigureerde instelling
                color: "#2196F3"
                type: line
                curve: straight
                data_generator: |
                  const st = hass.states['sensor.quatt_warmteanalyse_actual_stooklijn_setting'];
                  const s = parseFloat(st?.state), ic = st?.attributes?.intercept;
                  if (isNaN(s) || s === 0 || ic == null) return [];
                  const now = Date.now(), pts = [];
                  for (let t = -10; t <= 19; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }
                  return pts;
              - entity: sensor.quatt_warmteanalyse_freezing_performance_slope
                name: HP capaciteit (vorst)
                color: "#1E88E5"
                type: line
                curve: straight
                data_generator: |
                  const st = hass.states['sensor.quatt_warmteanalyse_freezing_performance_slope'];
                  const s = parseFloat(st?.state), ic = st?.attributes?.intercept;
                  const maxT = st?.attributes?.knee_temperature ?? 2;
                  if (isNaN(s) || ic == null) return [];
                  const now = Date.now(), pts = [];
                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }
                  return pts;
              - entity: sensor.quatt_warmteanalyse_gas_heat_loss_coefficient
                name: Gas data
                color: "#FFB74D"
                data_generator: |
                  const attrs = hass.states['sensor.quatt_warmteanalyse_gas_heat_loss_coefficient']?.attributes || {};
                  const balanceTemp = attrs.balance_point ?? 20;
                  const now = Date.now(), d = (attrs.scatter_data || []).filter(p => p.heat > 0 && p.temp < balanceTemp);
                  return d.map(p => [now - (20 - p.temp) * 3600000, p.heat]);
              - entity: sensor.quatt_warmteanalyse_gas_heat_loss_coefficient
                name: Gas trendlijn
                color: "#FF9800"
                type: line
                curve: straight
                data_generator: |
                  const attrs = hass.states['sensor.quatt_warmteanalyse_gas_heat_loss_coefficient']?.attributes || {};
                  const s = attrs.slope, ic = attrs.intercept;
                  if (!s || ic == null) return [];
                  const now = Date.now(), pts = [], maxT = s !== 0 ? Math.min(-ic/s, 19) : 19;
                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }
                  return pts;
            grid_options:
              columns: 24
              rows: auto

          # ── Grafiek 2: Aanvoertemperatuur — Werkelijk vs Aanbevolen ──────────
          - type: custom:mini-graph-card
            name: Aanvoertemperatuur — Werkelijk vs Aanbevolen
            hours_to_show: 336
            points_per_hour: 1
            line_width: 1.5
            entities:
              - entity: sensor.heatpump_flowmeter_temperature
                name: Werkelijke aanvoertemp
                color: "#64B5F6"
              - entity: sensor.quatt_warmteanalyse_aanbevolen_aanvoertemperatuur
                name: Aanbevolen aanvoertemp
                color: "#4CAF50"
              - entity: sensor.heatpump_hp1_temperature_outside
                name: Buitentemperatuur
                color: "#90A4AE"
            grid_options:
              columns: 24
              rows: auto

          # ── Grafiek 3: Comfort & Klimaat ────────────────────────────────────
          - type: custom:mini-graph-card
            name: Comfort & Klimaat (laatste 7 dagen)
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            entities:
              - entity: sensor.heatpump_thermostat_room_temperature
                name: Kamertemperatuur
                color: "#2196F3"
              - entity: sensor.heatpump_thermostat_room_setpoint
                name: Setpoint
                color: "#F44336"
              - entity: sensor.thermostat_temperature_outside
                name: Buitentemperatuur
                color: "#90A4AE"
            grid_options:
              columns: 24
              rows: auto

          # ── Grafiek 4: COP vs Buitentemperatuur ────────────────────────────
          - type: custom:apexcharts-card
            chart_type: scatter
            header:
              title: COP vs Buitentemperatuur
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 350
              xaxis:
                min: "EVAL:Date.now() - 36 * 3600000"
                max: "EVAL:Date.now()"
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: "EVAL:function(val) { return Math.round(20 - (new Date().getTime() - val) / 3600000) + '°C'; }"
              yaxis:
                title:
                  text: COP
                min: 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_average_cop
                name: Dagelijkse COP
                color: "#2196F3"
                data_generator: |
                  const attrs = hass.states['sensor.quatt_warmteanalyse_average_cop']?.attributes || {};
                  const now = Date.now(), d = [...(attrs.cop_scatter_data || [])].sort((a, b) => a.temp - b.temp);
                  return d.map(p => [now - (20 - p.temp) * 3600000, p.cop]);
              - entity: sensor.quatt_warmteanalyse_average_cop
                name: COP trendlijn
                color: "#90CAF9"
                type: line
                curve: straight
                data_generator: |
                  const attrs = hass.states['sensor.quatt_warmteanalyse_average_cop']?.attributes || {};
                  const d = [...(attrs.cop_scatter_data || [])].sort((a, b) => a.temp - b.temp);
                  if (d.length < 2) return [];
                  const now = Date.now(), pts = [];
                  for (let i = 0; i < d.length - 1; i++) {
                    const steps = Math.max(1, Math.round((d[i+1].temp - d[i].temp) / 0.25));
                    for (let s = 0; s <= steps; s++) {
                      const f = s / steps;
                      const t = d[i].temp + f * (d[i+1].temp - d[i].temp);
                      pts.push([
                        now - (20 - t) * 3600000,
                        d[i].cop + f * (d[i+1].cop - d[i].cop)
                      ]);
                    }
                  }
                  return pts;
            grid_options:
              columns: 24
              rows: auto
