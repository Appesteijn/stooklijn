title: Quatt Warmteanalyse
views:
  # ─── VIEW 1: OVERZICHT ───────────────────────────────────────────────
  # Beantwoordt: "Hoe doet mijn warmtepomp het?"
  # Desktop: 2 kolommen | Mobiel: 1 kolom, alles gestapeld
  - title: Overzicht
    icon: mdi:home-thermometer
    type: sections
    max_columns: 2
    cards: []
    sections:
      # ── Linkerkolom: COP & status ──
      - type: grid
        cards:
          - type: gauge
            entity: sensor.quatt_warmteanalyse_geschatte_actuele_cop
            name: COP nu
            min: 0
            max: 6
            severity:
              green: 3
              yellow: 2
              red: 0
            needle: true
            grid_options:
              columns: full
              rows: 3
          - type: tile
            entity: sensor.quatt_warmteanalyse_average_cop
            name: Gemiddelde COP
            icon: mdi:gauge
            color: green
          - type: tile
            entity: sensor.quatt_warmteanalyse_analysis_status
            name: Status
            icon: mdi:information-outline
          - type: button
            name: Analyse starten
            icon: mdi:play-circle
            tap_action:
              action: call-service
              service: quatt_stooklijn.run_analysis
            show_name: true
            show_icon: true
            icon_height: 28px
            grid_options:
              columns: full
              rows: 1

      # ── Rechterkolom: kengetallen ──
      - type: grid
        cards:
          - type: tile
            entity: sensor.quatt_warmteanalyse_heat_loss_coefficient
            name: Warmteverlies (W/K)
            icon: mdi:home-thermometer
            color: orange
          - type: tile
            entity: sensor.quatt_warmteanalyse_balance_point_temperature
            name: Balanspunt
            icon: mdi:thermometer-check
            color: cyan
          - type: tile
            entity: sensor.quatt_warmteanalyse_knee_temperature
            name: Knikpunt
            icon: mdi:chart-line-variant
            color: amber
          - type: tile
            entity: sensor.heatpump_thermostat_control_setpoint
            name: Quatt Setpoint
            icon: mdi:thermometer-chevron-up
            color: red
          - type: tile
            entity: sensor.quatt_warmteanalyse_last_analysis
            name: Laatste analyse
            icon: mdi:clock-check-outline
          - type: tile
            entity: text.quatt_warmteanalyse_analyse_startdatum
            name: Startdatum
            icon: mdi:calendar-start

      # ── Comfort chart (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:mini-graph-card
            name: Comfort & Temperaturen (7 dagen)
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            show:
              labels: true
              points: false
            entities:
              - entity: sensor.heatpump_thermostat_room_temperature
                name: Kamer
                color: "#E53935"
              - entity: sensor.heatpump_thermostat_room_setpoint
                name: Setpoint
                color: "#FF8A80"
              - entity: sensor.thermostat_temperature_outside
                name: Buiten
                color: "#78909C"
            grid_options:
              columns: full
              rows: auto

      # ── Snel advies (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: markdown
            title: Quatt advies
            content: >
              {% set advies =
              states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit om advies te zien.*

              {% else %}

              {% set n =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'aantal_aanpassingen') | int(0) %}

              {% if n == 0 %}

              ✅ **Alle Quatt-instellingen zijn optimaal.**

              {% else %}

              ⚠️ **{{ advies }}**


              {% set sg =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stookgrens_advies') %}

              {% set vg =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'nominaal_vermogen_advies') %}

              {% if sg and 'goed' not in sg %}• {{ sg }}{% endif %}

              {% if vg and 'goed' not in vg %}• {{ vg }}{% endif %}


              *Ga naar het **Advies** tabblad voor alle details en
              stooklijnpunten.*

              {% endif %}

              {% endif %}
            grid_options:
              columns: full
              rows: auto

  # ─── VIEW 2: ANALYSE ─────────────────────────────────────────────────
  # Beantwoordt: "Wat zijn de details van mijn warmteprestaties?"
  - title: Analyse
    icon: mdi:chart-scatter-plot-hexbin
    type: sections
    max_columns: 2
    cards: []
    sections:
      # ── Thermisch profiel (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Huis thermisch profiel
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 350
              xaxis:
                min: EVAL:Date.now() - 36 * 3600000
                max: EVAL:Date.now()
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              yaxis:
                title:
                  text: Vermogen (W)
                min: 0
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(val) + ' W'; }
              tooltip:
                x:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              markers:
                size:
                  - 4
                  - 0
                  - 0
                  - 0
                  - 0
                  - 4
                  - 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_optimal_stooklijn_slope
                name: Dagelijkse warmtevraag
                color: "#66BB6A"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_optimal_stooklijn_slope']?.attributes
                  || {};

                  const balanceTemp = Math.min(attrs.balance_temp ?? 20, 20);

                  const now = Date.now(), d = (attrs.scatter_data ||
                  []).filter(p => p.heat > 0 && p.temp < Math.min(balanceTemp,
                  19));

                  return d.map(p => [now - (20 - p.temp) * 3600000, p.heat]);
              - entity: sensor.quatt_warmteanalyse_optimal_stooklijn_slope
                name: Optimale stooklijn
                color: "#4CAF50"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const st =
                  hass.states['sensor.quatt_warmteanalyse_optimal_stooklijn_slope'];

                  const s = parseFloat(st?.state), ic =
                  st?.attributes?.intercept;

                  if (isNaN(s) || ic == null) return [];

                  const now = Date.now(), pts = [], maxT = s !== 0 ?
                  Math.min(-ic/s, 19) : 19;

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_quatt_warmteanalyse_slope
                name: Quatt stooklijn (geschat)
                color: "#FFC107"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_quatt_warmteanalyse_slope']?.attributes
                  || {};

                  const s = attrs.slope_daily, ic = attrs.intercept_daily;

                  if (!s || ic == null) return [];

                  const now = Date.now(), pts = [], maxT = s !== 0 ?
                  Math.min(-ic/s, 19) : 19;

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_freezing_performance_slope
                name: HP capaciteit (vorst)
                color: "#1E88E5"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const st =
                  hass.states['sensor.quatt_warmteanalyse_freezing_performance_slope'];

                  const s = parseFloat(st?.state), ic =
                  st?.attributes?.intercept;

                  const maxT = st?.attributes?.knee_temperature ?? 2;

                  if (isNaN(s) || ic == null) return [];

                  const now = Date.now(), pts = [];

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_gas_heat_loss_coefficient
                name: Gas data
                color: "#FFB74D"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_gas_heat_loss_coefficient']?.attributes
                  || {};

                  const balanceTemp = attrs.balance_point ?? 20;

                  const now = Date.now(), d = (attrs.scatter_data ||
                  []).filter(p => p.heat > 0 && p.temp < balanceTemp);

                  return d.map(p => [now - (20 - p.temp) * 3600000, p.heat]);
              - entity: sensor.quatt_warmteanalyse_gas_heat_loss_coefficient
                name: Gas trendlijn
                color: "#FF9800"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_gas_heat_loss_coefficient']?.attributes
                  || {};

                  const s = attrs.slope, ic = attrs.intercept;

                  if (!s || ic == null) return [];

                  const now = Date.now(), pts = [], maxT = s !== 0 ?
                  Math.min(-ic/s, 19) : 19;

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
            grid_options:
              columns: full
              rows: auto

      # ── COP chart (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: COP vs Buitentemperatuur
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 300
              xaxis:
                min: EVAL:Date.now() - 36 * 3600000
                max: EVAL:Date.now()
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              yaxis:
                title:
                  text: COP
                min: 0
              tooltip:
                x:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              markers:
                size:
                  - 4
                  - 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_average_cop
                name: Dagelijkse COP
                color: "#42A5F5"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_average_cop']?.attributes
                  || {};

                  const now = Date.now(), d = [...(attrs.cop_scatter_data ||
                  [])].filter(p => p.cop > 0 && p.temp < 20).sort((a, b) =>
                  a.temp - b.temp);

                  return d.map(p => [now - (20 - p.temp) * 3600000, p.cop]);
              - entity: sensor.quatt_warmteanalyse_average_cop
                name: COP trendlijn
                color: "#1565C0"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_average_cop']?.attributes
                  || {};

                  const d = [...(attrs.cop_scatter_data || [])].filter(p =>
                  p.cop > 0 && p.temp < 20).sort((a, b) => a.temp - b.temp);

                  if (d.length < 2) return [];

                  const n = d.length, sumX = d.reduce((s,p) => s+p.temp, 0),
                  sumY = d.reduce((s,p) => s+p.cop, 0), sumXY = d.reduce((s,p)
                  => s+p.temp*p.cop, 0), sumX2 = d.reduce((s,p) =>
                  s+p.temp*p.temp, 0);

                  const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);

                  const intercept = (sumY - slope*sumX) / n;

                  const now = Date.now(), pts = [], minT = d[0].temp, maxT =
                  d[d.length-1].temp;

                  for (let t = minT; t <= maxT; t += 0.5) pts.push([now - (20 -
                  t) * 3600000, slope*t + intercept]);

                  pts.push([now - (20 - maxT) * 3600000, null]);

                  return pts;
            grid_options:
              columns: full
              rows: auto

      # ── Warmtevraag tabel ──
      - type: grid
        cards:
          - type: markdown
            title: Warmtevraag per temperatuur
            content: >
              {% set temps =
              state_attr('sensor.quatt_warmteanalyse_heat_loss_coefficient',
              'heat_at_temps') %}

              {% if temps %}

              Buiten | Vermogen | Warmte/dag | COP | Stroom/dag

              :--|--:|--:|--:|--:

              {% for t, data in temps.items() -%}

              **{{ t }}°C** | **{{ data.heat | round(0) | int }} W** | {{
              (data.heat * 24 / 1000) | round(1) }} kWh | {% if data.cop %}{{
              data.cop | round(2) }}{% else %}-{% endif %} | {% if data.cop and
              data.cop > 0 %}{{ ((data.heat * 24 / 1000) / data.cop) | round(1)
              }} kWh{% else %}-{% endif %}

              {% endfor %}

              {% else %}

              *Voer eerst een analyse uit.*

              {% endif %}
            grid_options:
              columns: full
              rows: auto

      # ── Data & uitleg ──
      - type: grid
        cards:
          - type: markdown
            title: Databeschikbaarheid
            content: >
              {% set s =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'daily_days') %}

              {% if s is not none %}

              {% set daily =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'daily_days') | int(0) %}

              {% set hourly =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'hourly_hours') | int(0) %}

              {% set minutes =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'minute_minutes') | int(0) %}

              {% set c_days =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'cache_days') | int(0) %}

              {% set c_old =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'cache_oldest') %}

              {% set c_new =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'cache_newest') %}

              {% set k_pts =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_points') | int(0) %}

              {% set k_old =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_oldest') %}

              {% set k_new =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_newest') %}

              | Dataset | Omvang |

              |:--------|-------:|

              | Daggemiddeldes | **{{ daily }} dagen** |

              | Uurwaarden | **{{ hourly }} uur** |

              | Minuutwaarden | **{{ minutes }} min** |

              | Knie-datastore | **{{ k_pts }} ptn**{% if k_old %} ({{
              k_old[:7] }} – {{ k_new[:7] }}){% endif %} |

              | API-cache | **{{ c_days }} dagen**{% if c_old %} ({{
              c_old[:7] }} – {{ c_new[:7] }}){% endif %} |

              {% else %}

              *Voer eerst een analyse uit.*

              {% endif %}
            grid_options:
              columns: full
              rows: auto
          - type: markdown
            title: Wat betekenen de waarden?
            content: >
              {% set hlc =
              states('sensor.quatt_warmteanalyse_heat_loss_coefficient') %}

              {% set bp =
              states('sensor.quatt_warmteanalyse_balance_point_temperature') %}

              {% set knee =
              states('sensor.quatt_warmteanalyse_knee_temperature') %}

              {% set cop = states('sensor.quatt_warmteanalyse_average_cop') %}

              {% if hlc not in ['unknown', 'unavailable', 'None'] %}

              **Warmteverlies ({{ hlc }} W/K)** — Per graad kouder verliest
              je huis {{ hlc }} W. Lager = beter geïsoleerd.


              **Balanspunt ({{ bp }}°C)** — Boven deze buitentemp is geen
              verwarming nodig.


              **Knikpunt ({{ knee }}°C)** — Onder deze temp moet de
              cv-ketel bijspringen.


              **COP ({{ cop }})** — Elke kWh stroom levert {{ cop }} kWh
              warmte.

              {% else %}

              *Voer eerst een analyse uit.*

              {% endif %}
            grid_options:
              columns: full
              rows: auto

  # ─── VIEW 3: ADVIES ──────────────────────────────────────────────────
  # Beantwoordt: "Wat moet ik bij Quatt laten aanpassen?"
  - title: Advies
    icon: mdi:lightbulb-on-outline
    type: sections
    max_columns: 2
    cards: []
    sections:
      # ── Samenvatting (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: tile
            entity: sensor.quatt_warmteanalyse_quatt_advies_parameters
            name: Advies status
            icon: mdi:tune
            color: amber
          - type: tile
            entity: sensor.quatt_warmteanalyse_balance_point_temperature
            name: Balanspunt (optimaal)
            icon: mdi:thermometer-check
            color: cyan
          - type: tile
            entity: sensor.quatt_warmteanalyse_openquatt_balance_point
            name: OpenQuatt Balanspunt
            icon: mdi:home-thermometer-outline
            color: teal
          - type: markdown
            title: Advies samenvatting
            content: >
              {% set advies =
              states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              {% set sg =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stookgrens_advies') %}

              {% set vg =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'nominaal_vermogen_advies') %}

              {% set sl =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stooklijn_advies') %}

              {% set n =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'aantal_aanpassingen') | int(0) %}

              {% if n == 0 %}

              ✅ Alle instellingen zijn optimaal.

              {% else %}

              Geef de volgende aanpassingen door aan Quatt:


              {% if sg and 'goed' not in sg %}1. **Stookgrens:** {{ sg }}{%
              endif %}

              {% if vg and 'goed' not in vg %}2. **Vermogen:** {{ vg }}{%
              endif %}

              {% if sl %}3. **Stooklijn:** {{ sl }}{% endif %}

              {% endif %}

              {% endif %}
            grid_options:
              columns: full
              rows: auto

      # ── Stookgrens detail ──
      - type: grid
        cards:
          - type: markdown
            title: Stookgrens
            content: >
              {% set advies =
              states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              {% set cur =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stookgrens_huidig') %}

              {% set opt =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stookgrens_optimaal') %}

              {% set txt =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stookgrens_advies') %}

              | | Waarde |

              |:--|--:|

              | Quatt stooklijn (gemeten) | {% if cur %}**{{ cur }}°C**{% else
              %}*onbekend*{% endif %} |

              | Huis optimaal (lineair) | {% if opt %}**{{ opt }}°C**{% else %}*onbekend*{%
              endif %} |


              {% if txt %}{{ txt }}{% endif %}

              {% endif %}
            grid_options:
              columns: full
              rows: auto

      # ── Nominaal vermogen detail ──
      - type: grid
        cards:
          - type: markdown
            title: Nominaal vermogen (bij -10°C)
            content: >
              {% set advies =
              states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              {% set cur =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'nominaal_vermogen_huidig_w') %}

              {% set opt =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'nominaal_vermogen_optimaal_w') %}

              {% set txt =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'nominaal_vermogen_advies') %}

              | | Waarde |

              |:--|--:|

              | Huidig (Quatt) | {% if cur %}**{{ cur }} W**{% else %}*niet
              geconfigureerd*{% endif %} |

              | Optimaal | {% if opt %}**{{ opt }} W**{% else %}*onbekend*{%
              endif %} |


              {% if txt %}{{ txt }}{% endif %}

              {% endif %}
            grid_options:
              columns: full
              rows: auto

      # ── Stooklijn breakpoints + chart (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: markdown
            title: Optimale stooklijn breakpoints
            content: >
              {% set punten =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stooklijn_punten') %}

              {% if punten %}

              {% set txt =
              state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters',
              'stooklijn_advies') %}

              Geef deze punten door aan Quatt:


              Buitentemp | Aanvoertemp

              :--|--:

              {% for bp in punten -%}

              **{{ bp.buiten_temp }}°C** | **{{ bp.aanvoer_temp }}°C**

              {% endfor %}


              {% if txt %}*{{ txt }}*{% endif %}

              {% else %}

              *Voer eerst een analyse uit.*

              {% endif %}
            grid_options:
              columns: 12
              rows: auto
          - type: custom:apexcharts-card
            header:
              title: Stooklijn — Optimaal vs Huidig
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 300
              xaxis:
                min: EVAL:Date.now() - 30 * 3600000
                max: EVAL:Date.now()
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              yaxis:
                title:
                  text: Aanvoertemperatuur (°C)
                min: 20
                max: 55
              tooltip:
                x:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              markers:
                size:
                  - 5
                  - 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_openquatt_stooklijn
                name: Optimale breakpoints
                color: "#4CAF50"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_openquatt_stooklijn']?.attributes
                  || {};

                  const bps = attrs.breakpoints || [];

                  if (!bps.length) return [];

                  const now = Date.now();

                  return bps.map(bp => [now - (20 - bp.buiten_temp) * 3600000,
                  bp.aanvoer_temp]);
              - entity: sensor.quatt_warmteanalyse_openquatt_stooklijn
                name: Optimale curve
                color: "#4CAF50"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_openquatt_stooklijn']?.attributes
                  || {};

                  const bps = attrs.breakpoints || [];

                  if (!bps.length) return [];

                  const now = Date.now();

                  return bps.map(bp => [now - (20 - bp.buiten_temp) * 3600000,
                  bp.aanvoer_temp]);
            grid_options:
              columns: 12
              rows: auto

      # ── OpenQuatt info (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: markdown
            title: OpenQuatt integratie
            content: >
              {% set bp =
              states('sensor.quatt_warmteanalyse_openquatt_balance_point') %}

              {% set curve =
              states('sensor.quatt_warmteanalyse_openquatt_stooklijn') %}

              {% if bp in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              Sensoren beschikbaar voor OpenQuatt automations:


              | Sensor | Waarde |

              |:--|--:|

              | Balanspunt | **{{ bp }}°C** |

              | Stooklijn breakpoints | **{{ curve }} punten** |

              | MPC aanvoertemp | **{{
              states('sensor.quatt_warmteanalyse_mpc_aanbevolen_aanvoertemperatuur')
              }}°C** |


              Maak een HA-automation die deze waarden naar je OpenQuatt
              entiteiten schrijft.

              {% endif %}
            grid_options:
              columns: full
              rows: auto

  # ─── VIEW 4: MPC VALIDATIE ───────────────────────────────────────────
  # Beantwoordt: "Is het MPC-advies beter dan de vaste stooklijn?"
  - title: MPC
    icon: mdi:brain
    type: sections
    max_columns: 2
    cards: []
    sections:
      # ── Status tegels (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: tile
            entity: sensor.quatt_warmteanalyse_aanbevolen_aanvoertemperatuur
            name: Stooklijn advies
            icon: mdi:thermometer-water
            color: blue
          - type: tile
            entity: sensor.quatt_warmteanalyse_mpc_aanbevolen_aanvoertemperatuur
            name: MPC advies
            icon: mdi:brain
            color: green
          - type: tile
            entity: sensor.quatt_warmteanalyse_stooklijn_fout_aanvoertemperatuur
            name: Stooklijn fout
            icon: mdi:thermometer-alert
            color: blue
          - type: tile
            entity: sensor.quatt_warmteanalyse_mpc_fout_aanvoertemperatuur
            name: MPC fout
            icon: mdi:thermometer-alert
            color: green

      # ── Thermisch model (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: markdown
            title: Thermisch model (online learning)
            content: >
              {% set mpc =
              'sensor.quatt_warmteanalyse_mpc_aanbevolen_aanvoertemperatuur' %}

              {% set src = state_attr(mpc, 'model_source') %}

              {% if src %}

              {% set conv = state_attr(mpc, 'model_converged') %}

              {% set n = state_attr(mpc, 'model_n_updates') | int(0) %}

              {% set U = state_attr(mpc, 'model_U_wk') %}

              {% set C = state_attr(mpc, 'model_C_whk') %}

              {% set g = state_attr(mpc, 'model_g_solar') %}

              {% set tau = state_attr(mpc, 'model_tau_hours') %}

              {% if conv %}

              | Parameter | Waarde | Betekenis |

              |:--|--:|:--|

              | Warmteverlies | **{{ U }} W/K** | Per °C kouder verliest
              je huis {{ U }} W |

              | Thermische massa | **{{ C }} Wh/K** | Hoe traag reageert
              je huis op veranderingen |

              | Tijdconstante | **{{ tau }} uur** | Tijd om 63% af te
              koelen zonder verwarming |

              | Zonnewinst | **{{ g }} W/(W/m²)** | Effectief
              raamoppervlak × glastransmissie |

              | Updates | **{{ n }}** ({{ (n / 24) | round(0) | int }}
              dagen) | |


              Bron: **{{ src }}** — het model leert elk uur bij.

              {% elif n < 48 %}

              Model is aan het leren... **{{ n }}/48 updates** (nog {{
              48 - n }} uur).


              Gebruikt nu het batch warmteverliesmodel als fallback.

              {% else %}

              Model heeft genoeg data (**{{ n }} updates**), maar de
              geleerde parameters zijn nog buiten fysisch bereik:

              | Parameter | Huidig | Verwacht |

              |:--|--:|--:|

              | Warmteverlies | {{ U }} W/K | 30–800 W/K |

              | Thermische massa | {{ C }} Wh/K | 500–30000 Wh/K |

              | Zonnewinst | {{ g }} W/(W/m²) | 0–20 |


              Wacht op meer koude uren waarbij de warmtepomp actief is —
              dan leert het model betrouwbare waarden.

              {% endif %}

              {% else %}

              *Model nog niet geladen. Start een analyse of wacht op het
              volgende uur.*

              {% endif %}
            grid_options:
              columns: full
              rows: auto

      # ── 6-uurs forecast (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: markdown
            title: 6-uurs forecast
            content: >
              {% set mpc =
              'sensor.quatt_warmteanalyse_mpc_aanbevolen_aanvoertemperatuur' %}

              {% set fc = state_attr(mpc, 'forecast_6h') %}

              {% set src = state_attr(mpc, 'model_source') %}

              {% if fc and fc | length > 0 %}

              {% set ns = namespace(tbl='| Uur | T buiten | T binnen | HP | Vermogen | Aanvoer |\n|:--|--:|--:|:--:|--:|--:|\n', has_solar=false) %}{% for h in fc %}{% set t_in = h.get('t_indoor_predicted') %}{% if h.get('solar_gain_w', 0) > 100 %}{% set ns.has_solar = true %}{% endif %}{% set ns.tbl = ns.tbl + '| **+' + h.hour|string + '** | ' + h.temp_forecast|string + '°C | ' + (t_in|string + '°C' if t_in is not none else '-') + ' | ' + ('🔥' if h.get('hp_needed') else '⏸️') + ' | ' + (h.get('q_hp_needed_w')|string + ' W' if h.get('q_hp_needed_w') is not none else '-') + ' | ' + (h.supply_temp|string + '°C' if h.supply_temp is not none else '-') + ' |\n' %}{% endfor %}

              {{ ns.tbl }}

              {% if ns.has_solar %}

              ☀️ Zonnewinst verlaagt de warmtevraag.

              {% endif %}

              *Bron: {{ src | default('batch') }}*

              {% else %}

              *Geen forecast beschikbaar. Wacht op weersverwachting.*

              {% endif %}
            grid_options:
              columns: full
              rows: auto

      # ── Aanvoertemperatuur vergelijking (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:mini-graph-card
            name: Aanvoertemperatuur — Advies vs Werkelijk (24 uur)
            hours_to_show: 24
            points_per_hour: 4
            line_width: 1.5
            show:
              labels: true
              points: false
            entities:
              - entity: sensor.heatpump_flowmeter_temperature
                name: Werkelijk
                color: "#90A4AE"
              - entity: sensor.quatt_warmteanalyse_aanbevolen_aanvoertemperatuur
                name: Stooklijn advies
                color: "#2196F3"
              - entity: sensor.quatt_warmteanalyse_mpc_aanbevolen_aanvoertemperatuur
                name: MPC advies
                color: "#4CAF50"
            grid_options:
              columns: full
              rows: auto

      # ── Foutmeting (volle breedte) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Fout — Advies minus Werkelijk (24 uur)
              show: true
            graph_span: 24h
            apex_config:
              chart:
                height: 200
              yaxis:
                min: -10
                max: 10
                tickAmount: 4
              stroke:
                width: [2, 2]
                curve: smooth
                dashArray: [0, 4]
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "#999"
                    strokeDashArray: 4
                    borderWidth: 1
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_stooklijn_fout_aanvoertemperatuur
                name: Stooklijn fout
                color: "#2196F3"
                stroke_width: 2
              - entity: sensor.quatt_warmteanalyse_mpc_fout_aanvoertemperatuur
                name: MPC fout
                color: "#FF9800"
                stroke_width: 2
            grid_options:
              columns: full
              rows: auto

      # ── Buitentemperatuur context ──
      - type: grid
        cards:
          - type: custom:mini-graph-card
            name: Buitentemperatuur (7 dagen)
            hours_to_show: 168
            points_per_hour: 1
            line_width: 1
            show:
              labels: true
              points: false
            entities:
              - entity: sensor.heatpump_hp1_temperature_outside
                name: Buitentemp
                color: "#78909C"
            grid_options:
              columns: full
              rows: auto

  # ─── VIEW 5: GELUID ─────────────────────────────────────────────────
  # Beantwoordt: "Is het stookgedrag rustiger met geluidsniveaucompensatie?"
  - title: Geluid
    icon: mdi:volume-vibrate
    type: sections
    max_columns: 2
    cards: []
    sections:
      # ── Aanvoertemperatuur: advies vs werkelijk (48 uur) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Aanvoertemperatuur — advies vs werkelijk (48 uur)
              show: true
            graph_span: 48h
            span:
              end: now
            yaxis:
              - id: temp
                min: 15
                max: 55
                decimals: 0
                apex_config:
                  title:
                    text: "°C"
            apex_config:
              chart:
                height: 280
              stroke:
                curve: smooth
              legend:
                show: true
            series:
              - entity: sensor.quatt_warmteanalyse_mpc_aanbevolen_aanvoertemperatuur
                name: MPC advies
                yaxis_id: temp
                color: "#4CAF50"
                stroke_width: 2
                opacity: 0.8
              - entity: sensor.heatpump_flowmeter_temperature
                name: Werkelijke aanvoer
                yaxis_id: temp
                color: "#2196F3"
                stroke_width: 2
              - entity: sensor.heatpump_hp1_temperature_water_in
                name: Retour
                yaxis_id: temp
                color: "#9E9E9E"
                stroke_width: 1
                opacity: 0.5
            grid_options:
              columns: full
              rows: auto

      # ── Vermogen + geluidsniveau (48 uur) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Warmtepomp vermogen & geluidsniveau (48 uur)
              show: true
            graph_span: 48h
            span:
              end: now
            yaxis:
              - id: power
                min: 0
                decimals: 0
                apex_config:
                  title:
                    text: "W"
              - id: level
                opposite: true
                min: 0
                max: 4
                decimals: 0
                apex_config:
                  title:
                    text: Niveau
                  labels:
                    formatter: |
                      EVAL:function(val) {
                        var m = {"0":"uit","1":"building87","2":"silent","3":"library","4":"normal"};
                        return m[Math.round(val)] || val;
                      }
            apex_config:
              chart:
                height: 280
              stroke:
                curve: stepline
              legend:
                show: true
            series:
              - entity: sensor.heatpump_total_power
                name: HP vermogen
                yaxis_id: power
                color: "#FF5722"
                stroke_width: 2
                type: area
                opacity: 0.15
              - entity: sensor.heatpump_boiler_heat_power
                name: Gasketel
                yaxis_id: power
                color: "#FF9800"
                stroke_width: 2
                type: area
                opacity: 0.15
              - entity: sensor.quatt_warmteanalyse_geluidsniveau
                name: Geluidsniveau
                yaxis_id: level
                color: "#9C27B0"
                stroke_width: 3
                transform: |
                  return {"building87":1,"silent":2,"library":3,"normal":4}[x] || 0;
            grid_options:
              columns: full
              rows: auto

      # ── Aanvoer-fout (MPC error) — smoothness indicator (48 uur) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Afwijking MPC-advies (48 uur)
              show: true
            graph_span: 48h
            span:
              end: now
            yaxis:
              - id: error
                decimals: 1
                apex_config:
                  title:
                    text: "°C"
            apex_config:
              chart:
                height: 200
              stroke:
                curve: smooth
              annotations:
                yaxis:
                  - y: 2
                    borderColor: "#FF9800"
                    strokeDashArray: 4
                    label:
                      text: "+2°C dead band"
                      style:
                        color: "#FF9800"
                  - y: -2
                    borderColor: "#FF9800"
                    strokeDashArray: 4
                    label:
                      text: "-2°C dead band"
                      style:
                        color: "#FF9800"
                  - y: 0
                    borderColor: "#4CAF50"
                    strokeDashArray: 0
              legend:
                show: true
            series:
              - entity: sensor.quatt_warmteanalyse_mpc_fout_aanvoertemperatuur
                name: MPC fout (advies − werkelijk)
                yaxis_id: error
                color: "#2196F3"
                stroke_width: 2
                type: area
                opacity: 0.1
            grid_options:
              columns: full
              rows: auto

      # ── Debiet & buitentemperatuur context (48 uur) ──
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              title: Debiet & buitentemperatuur (48 uur)
              show: true
            graph_span: 48h
            span:
              end: now
            yaxis:
              - id: flow
                min: 0
                decimals: 0
                apex_config:
                  title:
                    text: "l/h"
              - id: temp
                opposite: true
                decimals: 0
                apex_config:
                  title:
                    text: "°C"
            apex_config:
              chart:
                height: 220
              stroke:
                curve: smooth
              legend:
                show: true
            series:
              - entity: sensor.heatpump_flowmeter_flowrate
                name: Debiet
                yaxis_id: flow
                color: "#03A9F4"
                stroke_width: 2
                type: area
                opacity: 0.1
              - entity: sensor.heatpump_hp1_temperature_outside
                name: Buitentemperatuur
                yaxis_id: temp
                color: "#78909C"
                stroke_width: 2
            grid_options:
              columns: full
              rows: auto

      # ── Geluidsniveau & gasketel status (bestaande kaart, nu in deze view) ──
      - type: grid
        column_span: 2
        cards:
          - type: history-graph
            title: Geluidsniveau & gasketel (48 uur)
            hours_to_show: 48
            entities:
              - entity: sensor.quatt_warmteanalyse_geluidsniveau
                name: Geluidsniveau
              - entity: binary_sensor.quatt_warmteanalyse_gasketel_actief
                name: Gasketel
              - entity: switch.quatt_warmteanalyse_geluidsniveau_compensatie
                name: Compensatie
            grid_options:
              columns: full
              rows: auto

      # ── Geluidsniveau compensatie (alleen zichtbaar als geconfigureerd) ──
      - type: grid
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.quatt_warmteanalyse_geluidsniveau_compensatie
                state_not: unavailable
            card:
              type: markdown
              title: Geluidsniveau Compensatie
              content: >
                {% set sw =
                states('switch.quatt_warmteanalyse_geluidsniveau_compensatie') %}

                {% set level =
                state_attr('switch.quatt_warmteanalyse_geluidsniveau_compensatie',
                'current_level') %}

                {% set mpc_err =
                state_attr('switch.quatt_warmteanalyse_geluidsniveau_compensatie',
                'mpc_error') %}

                {% set hp =
                state_attr('switch.quatt_warmteanalyse_geluidsniveau_compensatie',
                'hp_active') %}

                {% set gas =
                state_attr('switch.quatt_warmteanalyse_geluidsniveau_compensatie',
                'gas_active') %}

                {% set boiler =
                state_attr('switch.quatt_warmteanalyse_geluidsniveau_compensatie',
                'boiler_heat_w') %}

                | | Status |

                |:--|:--|

                | Switch | {% if sw == 'on' %}Aan{% else %}Uit{% endif %} |

                | HP actief | {% if hp %}Ja{% else %}Nee{% endif %} |

                | Gas actief | {% if gas %}Ja ({{ boiler }} W){% else %}Nee{% endif %} |

                | Geluidsniveau | **{{ level | default('—') }}** |

                | MPC fout | {% if mpc_err is not none %}{{ mpc_err }}°C{%
                else %}*n/a*{% endif %} |


                {% if sw == 'on' %}

                {% if not hp %}

                HP inactief — geluidsniveau gereset naar 'normal'.

                {% elif gas %}

                Gas actief ({{ boiler }} W) — geluidsniveau omhoog naar
                **{{ level }}**.

                {% elif mpc_err is not none and mpc_err < -2 %}

                Aanvoer te hoog (fout={{ mpc_err }}°C) — geluidsniveau omlaag
                naar **{{ level }}**.

                {% elif mpc_err is not none and mpc_err > 2 %}

                Aanvoer te laag (fout={{ mpc_err }}°C) — geluidsniveau staat al
                op **{{ level }}** (max).

                {% else %}

                Aanvoer op schema — geluidsniveau op **{{ level }}**.

                {% endif %}

                {% endif %}
            grid_options:
              columns: full
              rows: auto
          - type: conditional
            conditions:
              - condition: state
                entity: switch.quatt_warmteanalyse_geluidsniveau_compensatie
                state_not: unavailable
            card:
              type: history-graph
              title: Geluidsniveau & gasketel (24 uur)
              hours_to_show: 24
              entities:
                - entity: sensor.quatt_warmteanalyse_geluidsniveau
                  name: Geluidsniveau
                - entity: binary_sensor.quatt_warmteanalyse_gasketel_actief
                  name: Gasketel
              grid_options:
                columns: full
                rows: auto
