title: Quatt Warmteanalyse
views:
  - title: Warmteanalyse
    icon: mdi:chart-line
    cards: []
    type: sections
    sections:
      - type: grid
        column_span: 4
        cards:
          - square: false
            type: grid
            cards:
              - type: entity
                entity: sensor.quatt_warmteanalyse_average_cop
                name: Gemiddelde COP
                icon: mdi:gauge
              - type: entity
                entity: sensor.quatt_warmteanalyse_geschatte_actuele_cop
                name: Actuele COP (schatting)
                icon: mdi:gauge-low
              - type: entity
                entity: sensor.quatt_warmteanalyse_heat_loss_coefficient
                name: Warmteverlies
                icon: mdi:home-thermometer
              - type: entity
                entity: sensor.quatt_warmteanalyse_balance_point_temperature
                name: Balans Temperatuur
                icon: mdi:thermometer-check
              - type: entity
                entity: sensor.quatt_warmteanalyse_knee_temperature
                name: Knikpunt
                icon: mdi:thermometer-alert
              - type: entity
                entity: sensor.heatpump_thermostat_control_setpoint
                name: Quatt Setpoint
                icon: mdi:thermometer-chevron-up
              - type: entity
                entity: text.quatt_warmteanalyse_analyse_startdatum
                name: Startdatum
              - type: entity
                entity: sensor.quatt_warmteanalyse_last_analysis
                name: Laatste Analyse
                icon: mdi:clock-check-outline
              - type: entity
                entity: sensor.quatt_warmteanalyse_analysis_status
                name: Status
                icon: mdi:information-outline
              - show_name: true
                show_icon: true
                type: button
                name: Analyse Starten
                icon: mdi:play-circle
                tap_action:
                  action: call-service
                  service: quatt_stooklijn.run_analysis
                icon_height: 48px
            grid_options:
              columns: full
              rows: auto
            columns: 2
          - type: markdown
            title: Quatt advies
            content: >
              {% set advies = states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              {% set n = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'aantal_aanpassingen') | int(0) %}

              {% if n == 0 %}

              ✅ **{{ advies }}**

              {% else %}

              ⚠️ **{{ advies }}**


              {% set sg = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'stookgrens_advies') %}

              {% set vg = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'nominaal_vermogen_advies') %}

              {% if sg and 'goed' not in sg %}• {{ sg }}{% endif %}

              {% if vg and 'goed' not in vg %}• {{ vg }}{% endif %}

              {% endif %}


              *Ga naar het **Quatt Advies** tabblad voor alle details en stooklijnpunten.*

              {% endif %}
            grid_options:
              columns: 14
              rows: auto
          - type: markdown
            title: Databeschikbaarheid
            content: >
              {% set s =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'daily_days') %}


              {% if s is not none %}


              {% set daily   =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'daily_days') | int(0) %}

              {% set hourly  =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'hourly_hours') | int(0) %}

              {% set minutes =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'minute_minutes') | int(0) %}

              {% set c_days  =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'cache_days') | int(0) %}

              {% set c_old   =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'cache_oldest') %}

              {% set c_new   =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'cache_newest') %}

              {% set k_days  =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_days') | int(0) %}

              {% set k_pts   =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_points') | int(0) %}

              {% set k_old   =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_oldest') %}

              {% set k_new   =
              state_attr('sensor.quatt_warmteanalyse_data_statistieken',
              'knee_store_newest') %}


              | Dataset | Omvang | Gebruik |

              |:--------|-------:|:--------|

              | Daggemiddeldes | **{{ daily }} dagen** | Warmteverlies &
              stooklijn |

              | Uurwaarden (API/cache) | **{{ hourly }} uur** | COP & stooklijn
              |

              | Minuutwaarden (recorder) | **{{ minutes }} min** |
              Knikpunt & helling (actueel) |

              | Knie-datastore | **{{ k_pts }} ptn**{% if k_old %} ({{
              k_old[:7] }} – {{ k_new[:7] }}){% endif %} | Knikpunt & helling
              (historisch) |

              | API-cache opgeslagen | **{{ c_days }} dagen**{% if c_old %} ({{
              c_old[:7] }} – {{ c_new[:7] }}){% endif %} | Minder API-aanvragen
              |


              {% else %}


              *Voer eerst een analyse uit.*


              {% endif %}
            grid_options:
              columns: 10
              rows: auto
          - type: markdown
            title: Warmtevraag bij verschillende temperaturen
            content: >
              {% set temps =
              state_attr('sensor.quatt_warmteanalyse_heat_loss_coefficient',
              'heat_at_temps') %}

              {% if temps %}

              Buitentemp | Vermogen | Warmte/dag | COP | Stroom/dag

              :--|--:|--:|--:|--:

              {% for t, data in temps.items() -%}

              **{{ t }}°C** | **{{ data.heat | round(0) | int }} W** | {{
              (data.heat * 24 / 1000) | round(1) }} kWh | {% if data.cop %}{{
              data.cop | round(2) }}{% else %}-{% endif %} | {% if data.cop and
              data.cop > 0 %}{{ ((data.heat * 24 / 1000) / data.cop) | round(1)
              }} kWh{% else %}-{% endif %}

              {% endfor %}

              {% else %}

              *Voer eerst een analyse uit*

              {% endif %}
            grid_options:
              columns: 12
              rows: auto
          - type: markdown
            title: Wat betekenen deze waarden?
            content: >
              {% set hlc =
              states('sensor.quatt_warmteanalyse_heat_loss_coefficient') %}

              {% set bp =
              states('sensor.quatt_warmteanalyse_balance_point_temperature') %}

              {% set knee =
              states('sensor.quatt_warmteanalyse_knee_temperature') %}

              {% set cop = states('sensor.quatt_warmteanalyse_average_cop') %}

              {% if hlc not in ['unknown', 'unavailable', 'None'] %}

              **Warmteverlies ({{ hlc }} W/K)** — Per graad dat het buiten
              kouder is dan de balanstemperatuur, verliest je huis {{ hlc }}
              Watt aan warmte. Hoe lager dit getal, hoe beter je huis is
              geïsoleerd.


              **Balanstemperatuur ({{ bp }}°C)** — De buitentemperatuur waarbij
              je huis geen verwarming nodig heeft. Boven deze temperatuur levert
              interne warmte (apparaten, zonlicht, bewoners) voldoende energie.


              **Knikpunt ({{ knee }}°C)** — De buitentemperatuur waaronder de
              warmtepomp het alleen niet meer redt en de cv-ketel moet
              bijspringen. Hoe lager dit punt, hoe groter het werkgebied van je
              warmtepomp.


              **Gemiddelde COP ({{ cop }})** — De efficiëntie van de warmtepomp:
              hoeveel kWh warmte je krijgt per kWh elektriciteit. Een COP van {{
              cop }} betekent dat elke kWh stroom {{ cop }} kWh warmte oplevert.

              {% else %}

              *Voer eerst een analyse uit om uitleg bij de waarden te zien.*

              {% endif %}
            grid_options:
              columns: 12
              rows: auto
      - type: grid
        column_span: 4
        cards:
          - type: custom:apexcharts-card
            header:
              title: Huis thermisch profiel
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 350
              xaxis:
                min: EVAL:Date.now() - 36 * 3600000
                max: EVAL:Date.now()
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              yaxis:
                title:
                  text: Vermogen (W)
                min: 0
                labels:
                  formatter: EVAL:function(val) { return Math.round(val) + ' W'; }
              tooltip:
                x:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              markers:
                size:
                  - 4
                  - 0
                  - 0
                  - 0
                  - 0
                  - 4
                  - 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_optimal_stooklijn_slope
                name: Dagelijkse warmtevraag
                color: "#66BB6A"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_optimal_stooklijn_slope']?.attributes
                  || {};

                  const balanceTemp = Math.min(attrs.balance_temp ?? 20, 20);

                  const now = Date.now(), d = (attrs.scatter_data ||
                  []).filter(p => p.heat > 0 && p.temp < Math.min(balanceTemp,
                  19));

                  return d.map(p => [now - (20 - p.temp) * 3600000, p.heat]);
              - entity: sensor.quatt_warmteanalyse_optimal_stooklijn_slope
                name: Optimale stooklijn
                color: "#4CAF50"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const st =
                  hass.states['sensor.quatt_warmteanalyse_optimal_stooklijn_slope'];

                  const s = parseFloat(st?.state), ic =
                  st?.attributes?.intercept;

                  if (isNaN(s) || ic == null) return [];

                  const now = Date.now(), pts = [], maxT = s !== 0 ?
                  Math.min(-ic/s, 19) : 19;

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_quatt_warmteanalyse_slope
                name: Quatt stooklijn (geschat)
                color: "#FFC107"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_quatt_warmteanalyse_slope']?.attributes
                  || {};

                  const s = attrs.slope_daily, ic = attrs.intercept_daily;

                  if (!s || ic == null) return [];

                  const now = Date.now(), pts = [], maxT = s !== 0 ?
                  Math.min(-ic/s, 19) : 19;

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_actual_stooklijn_setting
                name: Geconfigureerde instelling
                color: "#2196F3"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const st =
                  hass.states['sensor.quatt_warmteanalyse_actual_stooklijn_setting'];

                  const s = parseFloat(st?.state), ic =
                  st?.attributes?.intercept;

                  if (isNaN(s) || s === 0 || ic == null) return [];

                  const now = Date.now(), pts = [];

                  for (let t = -10; t <= 19; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - 19) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_freezing_performance_slope
                name: HP capaciteit (vorst)
                color: "#1E88E5"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const st =
                  hass.states['sensor.quatt_warmteanalyse_freezing_performance_slope'];

                  const s = parseFloat(st?.state), ic =
                  st?.attributes?.intercept;

                  const maxT = st?.attributes?.knee_temperature ?? 2;

                  if (isNaN(s) || ic == null) return [];

                  const now = Date.now(), pts = [];

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
              - entity: sensor.quatt_warmteanalyse_gas_heat_loss_coefficient
                name: Gas data
                color: "#FFB74D"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_gas_heat_loss_coefficient']?.attributes
                  || {};

                  const balanceTemp = attrs.balance_point ?? 20;

                  const now = Date.now(), d = (attrs.scatter_data ||
                  []).filter(p => p.heat > 0 && p.temp < balanceTemp);

                  return d.map(p => [now - (20 - p.temp) * 3600000, p.heat]);
              - entity: sensor.quatt_warmteanalyse_gas_heat_loss_coefficient
                name: Gas trendlijn
                color: "#FF9800"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_gas_heat_loss_coefficient']?.attributes
                  || {};

                  const s = attrs.slope, ic = attrs.intercept;

                  if (!s || ic == null) return [];

                  const now = Date.now(), pts = [], maxT = s !== 0 ?
                  Math.min(-ic/s, 19) : 19;

                  for (let t = -10; t <= maxT; t += 0.5) {
                    const v = s*t+ic; if (v>0) pts.push([now - (20 - t) * 3600000, Math.round(v)]);
                  }

                  if (pts.length > 0) pts.push([now - (20 - maxT) * 3600000,
                  null]);

                  return pts;
            grid_options:
              columns: 24
              rows: auto
          - type: custom:mini-graph-card
            name: Comfort & Klimaat (laatste 7 dagen)
            hours_to_show: 168
            points_per_hour: 2
            line_width: 2
            entities:
              - entity: sensor.heatpump_thermostat_room_temperature
                name: Kamertemperatuur
                color: "#2196F3"
              - entity: sensor.heatpump_thermostat_room_setpoint
                name: Setpoint
                color: "#F44336"
              - entity: sensor.thermostat_temperature_outside
                name: Buitentemperatuur
                color: "#90A4AE"
            grid_options:
              columns: 24
              rows: auto
          - type: custom:apexcharts-card
            header:
              title: COP vs Buitentemperatuur
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 350
              xaxis:
                min: EVAL:Date.now() - 36 * 3600000
                max: EVAL:Date.now()
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              yaxis:
                title:
                  text: COP
                min: 0
              tooltip:
                x:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new
                    Date().getTime() - val) / 3600000) + '°C'; }
              markers:
                size:
                  - 4
                  - 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_average_cop
                name: Dagelijkse COP
                color: "#2196F3"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_average_cop']?.attributes
                  || {};

                  const now = Date.now(), d = [...(attrs.cop_scatter_data ||
                  [])].filter(p => p.cop > 0 && p.temp < 20).sort((a, b) =>
                  a.temp - b.temp);

                  return d.map(p => [now - (20 - p.temp) * 3600000, p.cop]);
              - entity: sensor.quatt_warmteanalyse_average_cop
                name: COP trendlijn
                color: "#90CAF9"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_average_cop']?.attributes
                  || {};

                  const d = [...(attrs.cop_scatter_data || [])].filter(p =>
                  p.cop > 0 && p.temp < 20).sort((a, b) => a.temp - b.temp);

                  if (d.length < 2) return [];

                  const n = d.length, sumX = d.reduce((s,p) => s+p.temp, 0),
                  sumY = d.reduce((s,p) => s+p.cop, 0), sumXY = d.reduce((s,p)
                  => s+p.temp*p.cop, 0), sumX2 = d.reduce((s,p) =>
                  s+p.temp*p.temp, 0);

                  const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);

                  const intercept = (sumY - slope*sumX) / n;

                  const now = Date.now(), pts = [], minT = d[0].temp, maxT =
                  d[d.length-1].temp;

                  for (let t = minT; t <= maxT; t += 0.5) pts.push([now - (20 -
                  t) * 3600000, slope*t + intercept]);

                  pts.push([now - (20 - maxT) * 3600000, null]);

                  return pts;
            grid_options:
              columns: 24
              rows: auto
  - title: Quatt Advies
    icon: mdi:tune
    type: sections
    cards: []
    sections:
      - type: grid
        column_span: 4
        cards:
          - square: false
            type: grid
            columns: 3
            cards:
              - type: entity
                entity: sensor.quatt_warmteanalyse_quatt_advies_parameters
                name: Advies Status
                icon: mdi:tune
              - type: entity
                entity: sensor.quatt_warmteanalyse_balance_point_temperature
                name: Balanspunt (optimaal)
                icon: mdi:thermometer-check
              - type: entity
                entity: sensor.quatt_warmteanalyse_openquatt_balance_point
                name: OpenQuatt Balanspunt
                icon: mdi:home-thermometer-outline
            grid_options:
              columns: 24
              rows: auto
          - type: markdown
            title: Stookgrens
            content: >
              {% set advies = states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              {% set cur = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'stookgrens_huidig') %}

              {% set opt = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'stookgrens_optimaal') %}

              {% set txt = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'stookgrens_advies') %}

              | | Waarde |

              |:--|--:|

              | Huidig (Quatt) | {% if cur %}**{{ cur }}°C**{% else %}*onbekend*{% endif %} |

              | Optimaal (analyse) | {% if opt %}**{{ opt }}°C**{% else %}*onbekend*{% endif %} |


              {% if txt %}{{ txt }}{% endif %}

              {% endif %}
            grid_options:
              columns: 12
              rows: auto
          - type: markdown
            title: Nominaal vermogen (bij -10°C)
            content: >
              {% set advies = states('sensor.quatt_warmteanalyse_quatt_advies_parameters') %}

              {% if advies in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              {% set cur = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'nominaal_vermogen_huidig_w') %}

              {% set opt = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'nominaal_vermogen_optimaal_w') %}

              {% set txt = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'nominaal_vermogen_advies') %}

              | | Waarde |

              |:--|--:|

              | Huidig (Quatt) | {% if cur %}**{{ cur }} W**{% else %}*niet geconfigureerd*{% endif %} |

              | Optimaal (analyse) | {% if opt %}**{{ opt }} W**{% else %}*onbekend*{% endif %} |


              {% if txt %}{{ txt }}{% endif %}

              {% endif %}
            grid_options:
              columns: 12
              rows: auto
          - type: markdown
            title: Optimale stooklijn breakpoints
            content: >
              {% set punten = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'stooklijn_punten') %}

              {% if punten %}

              {% set txt = state_attr('sensor.quatt_warmteanalyse_quatt_advies_parameters', 'stooklijn_advies') %}

              Geef deze punten door aan Quatt om de stooklijn optimaal in te stellen:


              Buitentemp | Aanvoertemp

              :--|--:

              {% for bp in punten -%}

              **{{ bp.buiten_temp }}°C** | **{{ bp.aanvoer_temp }}°C**

              {% endfor %}


              {% if txt %}*{{ txt }}*{% endif %}

              {% else %}

              *Voer eerst een analyse uit.*

              {% endif %}
            grid_options:
              columns: 14
              rows: auto
          - type: custom:apexcharts-card
            header:
              title: Stooklijn — Optimaal vs Huidig
              show: true
            update_interval: "00:30:00"
            apex_config:
              chart:
                height: 300
              xaxis:
                min: EVAL:Date.now() - 30 * 3600000
                max: EVAL:Date.now()
                title:
                  text: Buitentemperatuur (°C)
                labels:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new Date().getTime() - val) / 3600000) + '°C'; }
              yaxis:
                title:
                  text: Aanvoertemperatuur (°C)
                min: 20
                max: 55
              tooltip:
                x:
                  formatter: >-
                    EVAL:function(val) { return Math.round(20 - (new Date().getTime() - val) / 3600000) + '°C'; }
              markers:
                size:
                  - 5
                  - 0
              legend:
                position: bottom
            series:
              - entity: sensor.quatt_warmteanalyse_openquatt_stooklijn
                name: Optimale breakpoints
                color: "#4CAF50"
                type: line
                stroke_width: 0
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_openquatt_stooklijn']?.attributes
                  || {};

                  const bps = attrs.breakpoints || [];

                  if (!bps.length) return [];

                  const now = Date.now();

                  return bps.map(bp => [now - (20 - bp.buiten_temp) * 3600000, bp.aanvoer_temp]);
              - entity: sensor.quatt_warmteanalyse_openquatt_stooklijn
                name: Optimale curve
                color: "#4CAF50"
                type: line
                stroke_width: 2
                curve: straight
                data_generator: >
                  const attrs =
                  hass.states['sensor.quatt_warmteanalyse_openquatt_stooklijn']?.attributes
                  || {};

                  const bps = attrs.breakpoints || [];

                  if (!bps.length) return [];

                  const now = Date.now();

                  return bps.map(bp => [now - (20 - bp.buiten_temp) * 3600000, bp.aanvoer_temp]);
            grid_options:
              columns: 24
              rows: auto
          - type: markdown
            title: OpenQuatt
            content: >
              {% set bp = states('sensor.quatt_warmteanalyse_openquatt_balance_point') %}

              {% set curve = states('sensor.quatt_warmteanalyse_openquatt_stooklijn') %}

              {% if bp in ['unknown', 'unavailable', 'None'] %}

              *Voer eerst een analyse uit.*

              {% else %}

              De volgende sensoren zijn beschikbaar voor OpenQuatt automations:


              | Sensor | Waarde |

              |:--|--:|

              | Balanspunt | **{{ bp }}°C** |

